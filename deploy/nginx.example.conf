# Master Alex — DigitalOcean droplet (one domain)
# Replace yourdomain.com with your real domain.
#
# DNS records:
#   A  @    -> DROPLET_IP
#   A  www  -> DROPLET_IP
#   A  services  -> DROPLET_IP
#
# SSL after nginx is live:
#   certbot --nginx -d yourdomain.com -d www.yourdomain.com -d services.yourdomain.com

# Redirect www on main site to apex (optional, common practice)
server {
    listen 80;
    server_name www.yourdomain.com;
    return 301 https://yourdomain.com$request_uri;
}

# Main website
server {
    listen 80;
    server_name yourdomain.com;
    root /var/www/master-alex-website/dist;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# Landing pages — services.yourdomain.com
server {
    listen 80;
    server_name services.yourdomain.com;
    root /var/www/master-alex-landing/dist;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SEO files
    location = /robots.txt {
        try_files $uri =404;
        access_log off;
    }

    location = /sitemap.xml {
        try_files $uri =404;
        access_log off;
    }

    # Static assets — long cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff2?)$ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # SPA — all routes (e.g. /get-ex-love-back) serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
